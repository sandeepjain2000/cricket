# ──────────────────────────────────────────────────────────────────────────────
#  Cricket Data Downloader — Configuration
#  Edit these values to tune behaviour without touching the main script.
# ──────────────────────────────────────────────────────────────────────────────

[cricsheet]
# Full ZIP of all Test match JSONs
full_url          = https://cricsheet.org/downloads/tests_json.zip

# T20 and LOI (ODI) match JSONs
url_t20           = https://cricsheet.org/downloads/t20s_json.zip
url_loi           = https://cricsheet.org/downloads/odis_json.zip

# URL template for "recently added" matches (used for incremental if days_back ≤ recent_days_limit)
# {days} is replaced at runtime with the number of days back from today
recent_url_tpl    = https://cricsheet.org/downloads/recently_added_{days}_json.zip

# If the incremental date range spans more than this many days back,
# the script will use full_url instead of recent_url_tpl
recent_days_limit = 365

[download]
# Download chunk size in KB (larger = faster on fast connections, more memory)
chunk_size_kb     = 64

# HTTP request timeout in seconds
request_timeout_s = 120

[logging]
# Log levels: DEBUG | INFO | WARNING | ERROR | CRITICAL
console_level     = INFO
file_level        = DEBUG

[postgres]
# Target Postgres databases for the T20 / LOI downloader.
# Three separate databases are used (one per format).
# Env vars PG_URL_T20 and PG_URL_LOI override these values at runtime.
#
# T20 → Supabase project `lwvejufzfbcnetrfgnuz`
#       Session pooler (IPv4-safe, port 5432, ap-northeast-1)
# LOI → still local Postgres; swap to its own Supabase project when provisioned.
url_t20           = postgresql://postgres.lwvejufzfbcnetrfgnuz:tnvgsL50YYLR0DPh@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
url_loi           = postgresql://postgres:postgres@localhost:5432/cricket_loi

# Rows buffered in memory before each batch INSERT into deliveries
batch_size        = 5000
